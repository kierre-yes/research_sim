server.port=8081
server.servlet.context-path=/

# File upload configuration
spring.servlet.multipart.max-file-size=1100MB
spring.servlet.multipart.max-request-size=1100MB

# i set this since i run concurrent up to 10 times
server.tomcat.max-swallow-size=-1
server.tomcat.max-http-form-post-size=2147483647

# Logging
logging.level.root=OFF
logging.level.com.thesis.cloudsim=OFF
logging.level.org.springframework.web=OFF
logging.level.org.cloudbus.cloudsim=OFF

# Algorithm configuration
algorithm.debug.enabled=false
algorithm.debug.iteration-interval=10

# set to true to enable Wilcoxon, emergency rollback
statistical.analysis.wilcoxon.enabled=false
statistical.analysis.wilcoxon.compute=false

# Plot storage configuration
plots.directory=plots

# MATLAB configuration
matlab.scripts.path=classpath:matlab
matlab.plot.dpi=96
matlab.plot.figure.width=800
matlab.plot.figure.height=600
matlab.plot.cache.enabled=true
matlab.plot.parallel.enabled=false

# Response compression 
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.compression.min-response-size=1024

# Timeouts for hour-long simulations 
spring.mvc.async.request-timeout=7200000
server.tomcat.connection-timeout=7200000
server.servlet.session.timeout=7200
server.tomcat.keep-alive-timeout=7200000
server.tomcat.async-timeout=7200000

# Connection pool settings for long-running requests
server.tomcat.max-connections=200
server.tomcat.accept-count=100
server.tomcat.max-keep-alive-requests=100

# Actuator endpoints (for health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.enabled=true
management.endpoint.health.show-details=never
