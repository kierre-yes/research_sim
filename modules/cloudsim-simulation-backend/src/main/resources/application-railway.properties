# Railway Production Configuration
# Optimized for 512MB memory limit while handling 10K tasks

# Server Configuration - Use Railway's PORT or default to 8081
server.port=${PORT:8081}
server.address=0.0.0.0
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain

# Memory Optimization
server.tomcat.max-threads=20
server.tomcat.min-spare-threads=2
server.tomcat.max-connections=100
server.tomcat.accept-count=10

# Algorithm Parameters - Optimized for 10K tasks
algorithm.max.cloudlets=10000
algorithm.max.vms=100
algorithm.population.size=30
algorithm.max.iterations=30

# JPA/Hibernate Settings (if using database)
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000

# Disable unnecessary features to save memory
spring.jmx.enabled=false
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
management.endpoints.enabled-by-default=false
management.endpoint.health.enabled=true
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.defaults.enabled=true

# Logging - Reduce in production but keep startup logging
logging.level.root=INFO
logging.level.com.thesis.cloudsim=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.boot=INFO
logging.level.org.cloudbus.cloudsim=WARN

# File Upload Settings (for CSV)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Request Timeout (10K tasks take ~72 seconds)
server.servlet.session.timeout=5m
spring.mvc.async.request-timeout=300000

# CORS for frontend
cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
