# Fast mode configuration for development/testing
# Reduces plot generation time significantly

# Use the fast MATLAB plot generation
matlab.plot.mode=fast
matlab.plot.function=generateComparisonPlots_fast

# Alternative: Use optimized mode (no file I/O)
# matlab.plot.mode=optimized
# matlab.plot.function=generateComparisonPlots_optimized

# Alternative: Disable plots entirely
# matlab.plot.enabled=false

# Reduce plot quality for speed
matlab.plot.dpi=72
matlab.plot.figure.width=480
matlab.plot.figure.height=320

# Skip non-essential plots
matlab.plot.skip.radar=true
matlab.plot.skip.vmutil=true
matlab.plot.skip.detailed=true

# Enable async plot generation
async.plot.enabled=true
async.plot.thread.pool.size=2
