# Example configuration file demonstrating early stopping feature
# This feature helps algorithms terminate early when they've converged,
# saving computational time without sacrificing solution quality

# Common parameters
maxIterations=150
populationSize=30

# Multi-objective weights (must sum to 1.0)
makespanWeight=0.25
costWeight=0.25
energyWeight=0.25
loadBalanceWeight=0.25

# Early stopping configuration
# Set to true to enable early stopping
enableEarlyStopping=true

# Number of iterations without improvement before stopping
# If fitness doesn't improve by fitnessImprovementThreshold for this many iterations, stop
stagnationIterations=15

# Minimum fitness improvement to not count as stagnation
# Smaller values = more sensitive to small improvements
fitnessImprovementThreshold=0.001

# For ACO only: Pheromone variance threshold
# When pheromone variance drops below this, it indicates convergence
pheromoneVarianceThreshold=0.01

# PSO-specific parameters (when using EPSO)
inertiaWeightMax=0.9
inertiaWeightMin=0.4
cognitiveCoefficient=1.5
socialCoefficient=1.5
maxVelocityInitial=6.0
maxVelocityFinal=1.0

# ACO-specific parameters (when using EACO)
alpha=1.2
beta=2.5
initialPheromone=0.1
minPheromone=0.005
maxPheromone=2.0
evaporationMin=0.1
evaporationMax=0.9
