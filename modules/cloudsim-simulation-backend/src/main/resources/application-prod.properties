server.port=8081
server.servlet.context-path=/

# CORS Configuration for production
spring.web.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# File upload configuration
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Logging configuration for production
logging.level.com.thesis.cloudsim=INFO
logging.level.org.springframework.web=WARN
logging.level.root=WARN

# Actuator endpoints for health checks
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Application info
info.app.name=CloudSim Simulation Backend
info.app.description=EPSO/EACO Load Balancing Simulation Platform
info.app.version=@project.version@
